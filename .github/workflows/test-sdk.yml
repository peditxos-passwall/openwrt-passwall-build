name: Test SDK
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          swap-storage: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: actions/checkout@v7
      - uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: x86_64-main
          EXTRA_FEEDS: >-
            src-git|passwall_packages|https://github.com/Openwrt-Passwall/openwrt-passwall-packages
            src-git|passwall_luci|https://github.com/Openwrt-Passwall/openwrt-passwall
            src-git|passwall2|https://github.com/Openwrt-Passwall/openwrt-passwall2
            src-git|peditx_themes|https://github.com/peditx/luci-theme-peditx^main
            src-git|peditx_carbon|https://github.com/peditx/luci-theme-carbonpx^main
            src-git|peditx_switch|https://github.com/peditx/luci-app-themeswitch^main
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          V: s
