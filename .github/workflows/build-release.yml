name: Build and Release

on:
  workflow_dispatch:
  push:
    paths:
      - cur_ver.json

jobs:
  release:
    name: Build passwall + peditx for x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          swap-storage: false

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install nvchecker
        run: pip3 install nvchecker

      - name: Checkout
        uses: actions/checkout@v7

      - name: Get build path
        id: get_build_path
        run: |
          echo "pkg=snapshots/packages" >> "$GITHUB_OUTPUT"
          echo "log=snapshots/faillogs" >> "$GITHUB_OUTPUT"

      - name: Retrieve Version
        id: ver
        run: |
          cp cur_ver.json new_ver.json
          vers=$(nvcmp -c nvchecker.toml -aj)
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $vers >> $GITHUB_OUTPUT

      - name: Override golang version
        run: echo "GOLANG_COMMIT=master" >> $GITHUB_ENV

      - name: Build Package
        uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: x86_64-main
          EXTRA_FEEDS: >-
            src-git|passwall_packages|https://github.com/Openwrt-Passwall/openwrt-passwall-packages^${{ steps.ver.outputs.packages }}
            src-git|passwall_luci|https://github.com/Openwrt-Passwall/openwrt-passwall^${{ steps.ver.outputs.passwall }}
            src-git|passwall2|https://github.com/Openwrt-Passwall/openwrt-passwall2^${{ steps.ver.outputs.passwall2 }}
            src-git|peditx_themes|https://github.com/peditx/luci-theme-peditx^main
            src-git|peditx_carbon|https://github.com/peditx/luci-theme-carbonpx^main
            src-git|peditx_switch|https://github.com/peditx/luci-app-themeswitch^main
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          V: s
          IGNORE_ERRORS: n m y
          BUILD_LOG: 1

      - name: Finding failure logs
        if: always()
        working-directory: logs/package/feeds
        run: |
          sed -ne 's!^ *ERROR: package/feeds/\(passwall[^ ]*\) .*$!\1!p' ../error.txt | sort -u | xargs -r find > ../../../logs.txt 2>/dev/null || true
          cat ../../../logs.txt 2>/dev/null || true

      - name: Prepare Output Folder
        run: |
          PKG_DIR=snapshots/packages/x86_64
          LOG_DIR=snapshots/faillogs/x86_64
          mkdir -p dist/$PKG_DIR dist/$LOG_DIR

          rsync -av bin/packages/x86_64/passwall* dist/$PKG_DIR/ 2>/dev/null || true
          rsync -av bin/packages/x86_64/luci-theme-peditx* dist/$PKG_DIR/ 2>/dev/null || true
          rsync -av bin/packages/x86_64/luci-theme-carbonpx* dist/$PKG_DIR/ 2>/dev/null || true
          rsync -av bin/packages/x86_64/luci-app-themeswitch* dist/$PKG_DIR/ 2>/dev/null || true

          cat ../../../logs.txt 2>/dev/null | xargs -r -I{} cp {} dist/$LOG_DIR/ 2>/dev/null || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-passwall-x86_64-main
          path: dist/
          retention-days: 7

      - name: Deploy to Server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SERVER_SSH_PORT || 22 }}" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/html/openwrt-passwall-build/

          rm -rf ~/.ssh/id_ed25519
